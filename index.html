  <style>
    :root {
      --text:#111827;
      --muted:#64748b;
      --line:#e5e7eb;
      --panel:#ffffff;
      --soft:#f8fafc;
      --shadow:0 10px 28px rgba(15,23,42,.13);
    }
    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif; color:var(--text); background:#f3f4f6; }
    body { overflow:hidden; }
    .app { height:100vh; display:grid; grid-template-columns:minmax(0,1fr) 410px; }
    #map { min-height:100%; background:#dbe4e8; }
    .side { display:flex; flex-direction:column; min-width:0; background:var(--panel); border-left:1px solid var(--line); }
    .top { padding:20px 18px 12px; border-bottom:1px solid var(--line); }
    h1 { font-size:24px; line-height:1.2; margin:0 0 8px; letter-spacing:0; }
    .meta { color:var(--muted); line-height:1.55; font-size:14px; }
    .search { width:100%; margin-top:14px; border:1px solid var(--line); border-radius:8px; padding:12px 12px; font-size:15px; outline:none; }
    .search:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.14); }
    .filters { display:flex; flex-wrap:wrap; gap:8px; padding-top:12px; }
    .pill { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); border-radius:8px; padding:7px 9px; background:#fff; font-size:14px; user-select:none; }
    .dot { width:12px; height:12px; border-radius:50%; display:inline-block; border:1px solid rgba(15,23,42,.28); flex:none; }
    .pill input { width:16px; height:16px; margin:0; accent-color:#2563eb; }
    .toolbar { display:flex; gap:8px; margin-top:12px; }
    .toolbar button { border:1px solid var(--line); background:#fff; border-radius:8px; padding:8px 10px; color:#1f2937; font-size:14px; }
    .toolbar button:active { transform:translateY(1px); }
    .list { overflow:auto; padding:12px 12px 18px; scroll-behavior:smooth; }
    .card { border:1px solid var(--line); border-left:6px solid var(--accent); border-radius:8px; padding:12px 12px 11px; margin:0 0 10px; background:#fff; box-shadow:0 2px 8px rgba(15,23,42,.05); cursor:pointer; }
    .card:hover { border-color:#cbd5e1; }
    .card.active { box-shadow:0 0 0 3px rgba(37,99,235,.16); }
    .title { font-weight:800; font-size:16px; line-height:1.35; margin-bottom:6px; }
    .sub { color:#4b5563; line-height:1.55; font-size:14px; }
    .groups { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
    .tag { display:inline-flex; align-items:center; border-radius:999px; padding:3px 7px; background:var(--soft); border:1px solid #e2e8f0; font-size:12px; color:#334155; }
    .empty { color:var(--muted); text-align:center; padding:40px 18px; }
    .leaflet-popup-content-wrapper { border-radius:8px; }
    .popup { min-width:260px; max-width:330px; }
    .popup h2 { font-size:18px; margin:0 0 6px; line-height:1.3; }
    .popup .addr { color:#475569; font-size:13px; line-height:1.5; margin-bottom:8px; }
    .popup .group { padding:8px 0; border-top:1px solid #e5e7eb; }
    .popup .group b { display:block; margin-bottom:3px; }
    .popup .small { color:#64748b; font-size:12px; line-height:1.45; }
    .popup a { color:#2563eb; text-decoration:none; margin-right:10px; }
    .legend { background:#fff; border-radius:8px; box-shadow:var(--shadow); padding:10px 12px; line-height:1.7; font-size:13px; }

    @media (max-width: 860px) {

      .app { height:auto; min-height:100vh; display:block; }

      .top { padding:18px 16px 12px; }
      h1 { font-size:23px; }
      .list { max-height:none; overflow:visible; padding:12px 10px 22px; }
      .pill { font-size:15px; padding:8px 10px; }
    }

    }
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function groupLine(g) {
      const fee = g.fee ? ` | 最高学费 ${fmtNum(g.fee)}` : '';
      const majors = g.majors ? `<div class="small">${esc(g.majors)}</div>` : '';
      return `<div class="group">
        <b><span style="color:${TIER_COLORS[g.tier]}">●</span> ${esc(g.group)} | ${esc(g.tier)}</b>
        <div class="small">排位 ${fmtNum(g.rank)} | ${diffText(g.diff)} | 分数 ${fmtNum(g.score)} | 计划 ${fmtNum(g.plan)}${fee}</div>
        ${majors}
      </div>`;
    }
    function popupHtml(m) {
      return `<div class="popup">
        <h2>${esc(m.school)} <span class="count-badge">${esc(m.campus)}</span></h2>
        <div class="addr">${esc(m.address)}<br>城市：${esc(m.city)} | 坐标：${esc(m.confidence)}</div>
        <div><a href="${m.links.amap}" target="_blank" rel="noopener">高德搜索</a><a href="${m.links.baidu}" target="_blank" rel="noopener">百度地图</a></div>
        ${m.groups.map(groupLine).join('')}
      </div>`;
    }
    function sortTiers(a,b) { return (TIER_ORDER[a] ?? 99) - (TIER_ORDER[b] ?? 99); }
    function tierLabel(tier) {
      const count = MARKERS.filter(m => m.tiers.includes(tier)).length;
      return `${tier} ${count}`;
    }
    Object.keys(TIER_COLORS).sort(sortTiers).forEach(tier => {
      const label = document.createElement('label');
      label.className = 'pill';
      label.innerHTML = `<span class="dot" style="background:${TIER_COLORS[tier]}"></span><input type="checkbox" checked data-tier="${tier}"><span>${tierLabel(tier)}</span>`;
      filtersEl.appendChild(label);
    });
    filtersEl.addEventListener('change', event => {
      const tier = event.target.dataset.tier;
      if (!tier) return;
      if (event.target.checked) activeTiers.add(tier); else activeTiers.delete(tier);
      render();
    });
    document.getElementById('showAll').addEventListener('click', () => {
      document.querySelectorAll('#filters input').forEach(input => { input.checked = true; activeTiers.add(input.dataset.tier); });
      searchEl.value = '';
      render();
    });
    document.getElementById('fitAll').addEventListener('click', fitVisible);
    searchEl.addEventListener('input', render);

    function visibleMarkers() {
      const q = searchEl.value.trim().toLowerCase();
      return MARKERS.filter(m => {
        const tierOk = m.tiers.some(t => activeTiers.has(t));
        const qOk = !q || m.searchText.toLowerCase().includes(q);
        return tierOk && qOk;
      });
    }
    function markerRadius(m) {
      return Math.max(9, Math.min(18, 8 + Math.sqrt(m.groupCount) * 3));
    }
    function setActive(id) {
      document.querySelectorAll('.card.active').forEach(el => el.classList.remove('active'));
      const el = document.querySelector(`[data-card="${id}"]`);
      if (el) el.classList.add('active');
    }
    function addMarker(m) {
      const marker = L.circleMarker([m.lat, m.lon], {
        radius: markerRadius(m),
        color:'#111827',
        weight:1.6,
        fillColor:m.color,
        fillOpacity:.88
      });
      marker.bindPopup(popupHtml(m), { maxWidth:360 });
      marker.on('click', () => setActive(m.id));
      marker.addTo(markerLayer);
      markerRefs.set(m.id, marker);
    }
    function renderList(items) {
      listEl.innerHTML = '';
      if (!items.length) {
        listEl.innerHTML = '<div class="empty">没有符合筛选的学校</div>';
        return;
      }
      items.forEach((m, idx) => {
        const best = m.groups[0];
        const tiers = m.tiers.map(t => `<span class="tag"><span class="dot" style="background:${TIER_COLORS[t]}"></span>${esc(t)}</span>`).join('');
        const groups = m.groups.slice(0, 5).map(g => `<span class="tag">${esc(g.group)} 排位 ${fmtNum(g.rank)}</span>`).join('');
        const more = m.groups.length > 5 ? `<span class="tag">+${m.groups.length - 5}</span>` : '';
        const card = document.createElement('article');
        card.className = 'card';
        card.dataset.card = m.id;
        card.style.setProperty('--accent', m.color);
        card.innerHTML = `<div class="title">${idx + 1}. ${esc(m.school)} <span class="count-badge">${esc(m.campus)}</span></div>
          <div class="sub">${esc(m.city)} | ${esc(m.confidence)} | ${m.groupCount} 个专业组 | 代表排位 ${fmtNum(best.rank)} | ${diffText(best.diff)}</div>
          <div class="groups">${tiers}${groups}${more}</div>`;
        card.addEventListener('click', () => {
          const marker = markerRefs.get(m.id);
          if (marker) {
            map.setView([m.lat, m.lon], Math.max(map.getZoom(), 12), { animate:true });
            marker.openPopup();
            setActive(m.id);
          }
        });
        listEl.appendChild(card);
      });
    }
    function fitVisible() {
      const pts = visibleMarkers().map(m => [m.lat, m.lon]);
      if (!pts.length) return;
      map.fitBounds(pts, { padding:[28,28], maxZoom:10 });
    }
    function render() {
      const items = visibleMarkers();
      markerLayer.clearLayers();
      markerRefs.clear();
      items.forEach(addMarker);
      renderList(items);
      document.getElementById('meta').textContent = `共 ${SUMMARY.schoolCount} 所广东高校、${SUMMARY.groupCount} 个专业组，合并为 ${SUMMARY.markerCount} 个校区点；参考排位 ${SUMMARY.targetRank.toLocaleString('zh-CN')}。`;
    }

    const legend = L.control({ position:'topright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div','legend');
      div.innerHTML = Object.keys(TIER_COLORS).sort(sortTiers).map(t => `<div class="row"><span class="dot" style="background:${TIER_COLORS[t]}"></span>${t}</div>`).join('');
      return div;
    };
    legend.addTo(map);
    render();
    setTimeout(fitVisible, 150);
  </script>
</body>
</html>
