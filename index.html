    .popup h2 { margin: 0 0 6px; font-size: 16px; }
    .popup p { margin: 4px 0; line-height: 1.45; }
    .popup .risk { margin-top: 7px; padding-top: 7px; border-top: 1px solid #e6eaf0; color: #9a3412; }
    .popup a { color: #175cd3; text-decoration: none; margin-right: 10px; }
    .leaflet-popup-content { min-width: 280px; }
    .fallback { display: none; padding: 12px 18px; color: #9a3412; background: #fff7ed; border-bottom: 1px solid #fed7aa; }

    const colors = {
      "冲高": "#dc2626",
      "冲": "#f97316",
      "小冲/稳": "#eab308",
      "稳": "#16a34a",
      "保": "#2563eb",
      "保底": "#4f46e5",
      "缺排位": "#6b7280"
    };
    const tierOrder = ["冲高", "冲", "小冲/稳", "稳", "保", "保底", "缺排位"];
    const active = new Set(tierOrder);
    const map = L.map("map", { zoomControl: true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap contributors"
    }).on("tileerror", () => {
      document.getElementById("fallback").style.display = "block";
    }).addTo(map);
    const bounds = L.latLngBounds(markers.map(m => [m.lat, m.lon]));
    map.fitBounds(bounds.pad(0.18));
    const markerLayer = L.layerGroup().addTo(map);
    const markerRefs = new Map();

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch]));
    }

    function popupHtml(m) {
      const campusSuffix = m.sub ? ` <span style="color:#64748b">点位${m.sub}</span>` : "";
      return `<div class="popup">
        <h2>${esc(m.order)}. ${esc(m.school)} ${esc(m.group)}${campusSuffix}</h2>
        <p><b>${esc(m.tier)}</b>｜2025排位 ${esc(m.rank)}｜差距 ${esc(m.diff)}｜最低分 ${esc(m.score)}</p>
        <p><b>校区：</b>${esc(m.campus)}｜置信度 ${esc(m.confidence)}</p>
        <p><b>地址：</b>${esc(m.address)}</p>
        <p><b>系统地点：</b>${esc(m.location)}</p>
        
        <p><b>已填专业：</b>${esc(m.selected)}</p>
        <p class="risk"><b>提醒：</b>校区和费用以招生系统、录取通知和学校新生指南为准。</p>
        
        <p><a href="${m.amap}" target="_blank">高德搜索</a><a href="${m.baidu}" target="_blank">百度地图</a></p>
      </div>`;
    }

    function render() {
      markerLayer.clearLayers();
      markerRefs.clear();
      const list = document.getElementById("list");
      list.innerHTML = "";
      markers.forEach((m, idx) => {
        if (!active.has(m.tier)) return;
        const color = colors[m.tier] || "#6b7280";
        const marker = L.circleMarker([m.lat, m.lon], {
          radius: 9,
          color: "#111827",
          weight: 1,
          fillColor: color,
          fillOpacity: 0.88
        }).bindPopup(popupHtml(m));
        marker.addTo(markerLayer);
        markerRefs.set(idx, marker);
        const div = document.createElement("div");
        div.className = "item";
        div.style.borderLeftColor = color;
        div.innerHTML = `<strong>${esc(m.order)}. ${esc(m.school)} ${esc(m.group)}｜${esc(m.tier)}</strong>
          <small>${esc(m.campus)}｜排位 ${esc(m.rank)}｜差距 ${esc(m.diff)}｜${esc(m.city)}</small>`;
        div.addEventListener("click", () => {
          map.setView([m.lat, m.lon], 12);
          marker.openPopup();
        });
        list.appendChild(div);
      });
    }

    function renderFilters() {
      const filters = document.getElementById("filters");
      filters.innerHTML = "";
      tierOrder.forEach(tier => {
        if (!markers.some(m => m.tier === tier)) return;
        const label = document.createElement("label");
        label.innerHTML = `<span class="dot" style="background:${colors[tier]}"></span><input type="checkbox" checked />${tier}`;
        const input = label.querySelector("input");
        input.addEventListener("change", () => {
          if (input.checked) active.add(tier); else active.delete(tier);
          render();
        });
        filters.appendChild(label);
      });
      const legend = document.getElementById("legend");
      legend.innerHTML = tierOrder.filter(t => markers.some(m => m.tier === t)).map(t => `<div><span class="dot" style="background:${colors[t]}"></span>${t}</div>`).join("");
    }

    renderFilters();
    render();
  </script>
